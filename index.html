<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedal 3D Designer</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/+esm",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/",
        "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.9.9/+esm",
        "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.18/+esm",
        "jszip": "https://cdn.jsdelivr.net/npm/jszip@3.10.1/+esm"
      }
    }
  </script>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <label for="preset-select">Preset:</label>
    <select id="preset-select">
      <option value="1590A">1590A</option>
      <option value="1590B">1590B</option>
      <option value="1590BB" selected>1590BB</option>
      <option value="1590XX">1590XX</option>
      <option value="Custom">Custom</option>
    </select>

    <div id="custom-dimensions" class="hidden">
      <label for="custom-width">W:</label>
      <input type="number" id="custom-width" min="10" max="200" step="0.1" value="60" />
      <label for="custom-depth">D:</label>
      <input type="number" id="custom-depth" min="10" max="200" step="0.1" value="112" />
      <label for="custom-height">H:</label>
      <input type="number" id="custom-height" min="10" max="200" step="0.1" value="31" />
    </div>

    <label for="screw-type">Screws:</label>
    <select id="screw-type">
      <option value="M3">M3</option>
      <option value="M2.5">M2.5</option>
    </select>

    <button id="export-stl">Export STL</button>
  </div>

  <!-- Main area -->
  <div id="main">
    <!-- Left panel -->
    <div id="left-panel">
      <h3>Components</h3>
      <div id="component-list"></div>

      <h3>Placed</h3>
      <div id="placed-list"></div>

      <div id="properties-panel" class="hidden">
        <h3>Properties</h3>
        <label for="prop-x">X:</label>
        <input type="number" id="prop-x" step="0.5" />
        <label for="prop-y">Y:</label>
        <input type="number" id="prop-y" step="0.5" />
        <button id="delete-component">Delete</button>
      </div>
    </div>

    <!-- Viewport -->
    <div id="viewport"></div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="dimensions-display">Dimensions: --</span>
    <span id="part-count">Parts: 0</span>
    <label id="snap-label">
      <input type="checkbox" id="snap-toggle" checked /> Snap (0.5mm)
    </label>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
